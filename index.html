<!DOCTYPE html>

<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Casa Fénix</title>

  <link rel="icon" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">
  <meta name="theme-color" content="#6C9EFF">
  <link rel="manifest" href="manifest.json">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔥 MENÚ -->

<div class="sidebar" id="sidebar">
  <img src="logo.png" class="logo">

  <div class="menu-item active" onclick="cargarVista('hoy', this)">🏠 Hoy</div>
  <div class="menu-item" onclick="cargarVista('evidencias', this)">📸 Registro</div>
  <div class="menu-item" onclick="toggleDarkMode()">🌙 Modo oscuro</div>
</div>

<!-- 🔥 BOTÓN -->

<div id="menuBtn" onclick="toggleMenu()">☰</div>

<!-- 🔥 CONTENIDO -->

<div class="main">

  <!-- HEADER -->

  <div class="header-box">
    <h1 id="titulo">Hoy</h1>
    <div id="hora"></div>
  </div>

  <!-- 🔥 BIENVENIDA -->

  <div class="card bienvenida">
    <h2>🔥 Casa Fénix</h2>
    <p>Gestión de aseo del hogar</p>
  </div>

  <!-- 🔥 PROGRESO (LO QUE TE FALTABA) -->

  <div class="card">
    <div id="progresoTexto">0% completado</div>
    <div class="barra-container">
      <div id="barraProgreso"></div>
    </div>
  </div>

  <!-- CONTENIDO DINÁMICO -->

  <div id="mainContent"></div>

</div>

<script src="app.js"></script>

</body>
</html>
